services:
  db:
    image: postgres:16-alpine
    container_name: secureops_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: secureops
      POSTGRES_PASSWORD: secureops
      POSTGRES_DB: secureops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secureops -d secureops"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
